<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>简洁收藏夹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* 头部（仅保留标题和搜索） */
        .header {
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .search-box {
            margin-bottom: 24px;
        }
        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            background: white;
        }
        .search-box input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        /* 分类标签 */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
        }
        .category-btn {
            background: #eef2f6;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .category-btn.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }
        /* 网站网格：极简卡片，只显示名称 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        .site-card {
            background: white;
            border-radius: 16px;
            padding: 14px 12px;
            text-align: center;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            border: 1px solid #eceff5;
        }
        .site-card a {
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1f2937;
            display: block;
            word-break: keep-all;
        }
        .site-card:hover {
            transform: translateY(-3px);
            border-color: #cbd5e1;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .site-card a:hover {
            color: #3b82f6;
        }
        @media (max-width: 600px) {
            .links-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
            }
            .site-card {
                padding: 10px 8px;
            }
            .site-card a {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📌 简洁收藏夹</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 搜索网站名称...">
        </div>
    </div>

    <div class="categories" id="categoryBar">
        <!-- 分类按钮会由 JS 动态生成 -->
    </div>

    <div id="sitesGrid" class="links-grid"></div>
</div>

<script>
    // ---------- 网站数据 ----------
    // 常用网站（置顶，按顺序）
    const pinnedSites = [
        { name: "DeepSeek", url: "https://chat.deepseek.com" },
        { name: "锤子便签", url: "https://yun.smartisan.com/#/notes" },
        { name: "豆包", url: "https://www.doubao.com/chat/" },
        { name: "Google", url: "https://www.google.com" },
        { name: "企业邮箱", url: "https://v6.35.com/v2/login/index" },
        { name: "1688", url: "https://www.1688.com/" },
        { name: "WeTransfer", url: "https://wetransfer.com/" },
        { name: "顺丰快递", url: "https://www.sf-express.com/chn/sc" }
    ];

    // 其余网站（按需增删，这里沿用之前的部分站点）
    const otherSites = [
        { name: "GitHub", url: "https://github.com" },
        { name: "YouTube", url: "https://www.youtube.com" },
        { name: "Netlify", url: "https://www.netlify.com" },
        { name: "ChatGPT", url: "https://chat.openai.com" },
        { name: "Claude", url: "https://claude.ai" },
        { name: "Midjourney", url: "https://www.midjourney.com" },
        { name: "Hugging Face", url: "https://huggingface.co" },
        { name: "Stack Overflow", url: "https://stackoverflow.com" },
        { name: "MDN", url: "https://developer.mozilla.org" },
        { name: "Figma", url: "https://www.figma.com" },
        { name: "Unsplash", url: "https://unsplash.com" },
        { name: "B站", url: "https://www.bilibili.com" },
        { name: "freeCodeCamp", url: "https://www.freecodecamp.org" }
    ];

    // 合并：常用在前，其余在后（不需要分类筛选的话，可以全部展示；但保留分类让用户可按类别过滤）
    // 为了方便分类，给每个网站加上 category 字段（常用网站统一归为“常用”，其余按内容归类）
    const allSites = [
        ...pinnedSites.map(s => ({ ...s, category: "常用" })),
        ...otherSites.map(s => ({ ...s, category: s.category || "其他" }))
    ];
    // 手动为 some sites 补充分类（简洁处理：大多数归为“其他”，也可以不分类直接展示）
    // 为了分类功能不混乱，给上面 otherSites 里面的一些站点加上具体分类
    const categoryMap = {
        "GitHub": "开发", "YouTube": "视频", "Netlify": "部署", "ChatGPT": "AI", "Claude": "AI",
        "Midjourney": "AI", "Hugging Face": "AI", "Stack Overflow": "开发", "MDN": "开发",
        "Figma": "设计", "Unsplash": "设计", "B站": "视频", "freeCodeCamp": "学习"
    };
    allSites.forEach(site => {
        if (site.category === "其他" && categoryMap[site.name]) {
            site.category = categoryMap[site.name];
        }
    });

    // 获取所有分类（去重，并把"常用"放在最前）
    let categoriesSet = new Set(allSites.map(s => s.category));
    let categories = Array.from(categoriesSet);
    categories.sort((a,b) => (a === "常用" ? -1 : (b === "常用" ? 1 : 0)));

    let currentCategory = "all";
    let currentSearch = "";

    function renderGrid() {
        let filtered = allSites;
        if (currentCategory !== "all") {
            filtered = filtered.filter(site => site.category === currentCategory);
        }
        if (currentSearch.trim() !== "") {
            const kw = currentSearch.trim().toLowerCase();
            filtered = filtered.filter(site => site.name.toLowerCase().includes(kw));
        }

        const grid = document.getElementById('sitesGrid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">⚡ 没有找到相关网站</div>';
            return;
        }
        grid.innerHTML = filtered.map(site => `
            <div class="site-card">
                <a href="${site.url}" target="_blank" rel="noopener noreferrer">${site.name}</a>
            </div>
        `).join('');
    }

    // 生成分类按钮
    function renderCategories() {
        const bar = document.getElementById('categoryBar');
        bar.innerHTML = `<button class="category-btn active" data-cat="all">全部</button>` +
            categories.map(cat => `<button class="category-btn" data-cat="${cat}">${cat}</button>`).join('');
        // 绑定事件
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.getAttribute('data-cat');
                renderGrid();
            });
        });
    }

    // 搜索
    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentSearch = e.target.value;
        renderGrid();
    });

    renderCategories();
    renderGrid();
</script>
</body>
</html>
